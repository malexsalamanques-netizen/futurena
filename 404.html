<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — futureña</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .notfound {
      max-width: 720px;
      margin: 0 auto;
      padding: 15vh 24px;
      text-align: left;
    }
    .notfound h1 {
      font-size: clamp(48px, 8vw, 96px);
      line-height: 1;
      letter-spacing: -0.03em;
      margin: 0 0 24px 0;
      font-weight: 500;
    }
    .notfound p {
      color: var(--ink-soft);
      max-width: 40ch;
      font-size: 18px;
      margin: 0 0 32px 0;
    }
    .notfound a {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 16px;
      border: 1px solid var(--ink);
      display: inline-block;
    }
    .notfound a:hover {
      background: var(--ink);
      color: var(--paper);
    }
  </style>
</head>
<body>
  <main class="notfound">
    <h1>404.</h1>
    <p>Esta página no existe (todavía). / This page doesn't exist (yet).</p>
    <a href="/">← futureña</a>
  </main>
</body>
</html>
